<body style="background-color: bisque;">

  <script>

    let primeNumbers = [];

    let numToCheck = +prompt("Up to what number would you like to check?", '');

    function listPrimes(n) {

      let isPrime = true;
      
        for (let i = 2; i <= n; i++) {

          isPrime = true;

          for (let x = 2; x < i; x++) {

            if (x == i) {

              continue;

            } else if (i % x == 0) {

              isPrime = false;
              break;

            } else {

              continue;

            }

          }

          if (isPrime == true) {

          primeNumbers.push(i);
            
          }

        }
      
        // primeNumbers.push(n);
      alert(primeNumbers);



    }

    listPrimes(numToCheck);


  </script>
