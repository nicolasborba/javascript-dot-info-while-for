<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <script>

    let isPrime = true;

    let numToCheck = +prompt("What number would you like to check, to see if it is prime or not?", '');

    function checkPrime(n) {

      checker: {
        for (let i = 2; i < n; i++) {

          if (!(n % i)) {

            isPrime = false;
            break checker;

          }

        }
      }

      if (isPrime) {

        alert(`Yes, ${n} is a prime number.`);

      } else {

        alert(`No, ${n} is not a prime number.`);

      }



    }

    checkPrime(numToCheck);


  </script>



</body>

</html>
